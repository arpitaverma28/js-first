<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

/*
setTimeout : setTimeout is used to run a function after a specified time (delay). It is an asynchronous function.
Syntax:  setTimeout(function, delay);
function → the code you want to run
delay → time in milliseconds
1000 milliseconds = 1 second 
*/
console.log("one");
console.log("two");
setTimeout(() =>{
    console.log("Hello");
},1000);
console.log("three");
console.log("four");

//Callback : A callback is a function passed as an argument to another function, and it runs later.
function add(a,b){
    console.log(a+b);
}
function calci(a,b,sumfun){
    sumfun(a,b);
}
calci(10,20,add);

//Callback Hell happens when many callbacks are nested inside each other, making the code hard to read and maintain.

let d1 = {
    name : "rashi",
    city :"Jhansi"
}
let d2 = {
    name : "arpita",
    city :"Barabanki"
}
let d3 = {
    name : "akash",
    city :"Lucknow"
}

function fun1(id ,f2){
    setTimeout(() =>{
 console.log(id);
 if(f2){
 f2();
 }
    },2000);
}
fun1(d1,()=>{
    fun1(d2,()=>{fun1(d3)});
});


/*
Promise : A Promise is used to handle asynchronous operations better than callbacks.
A promise has 3 states:
Pending – still working
Resolved (Fulfilled) – success
Rejected – error
let pro = new Promise((resolve,rejecte)=>{});
.then() → runs when success
.catch() → runs when error
*/
function fun(id ,nxt){
    return new Promise((resolve,reject) =>{
    setTimeout(()=>{
        console.log("Data : ",id);
        resolve("Success");
        if(nxt){
            nxt();
        }
    },10000);
    });
}
   const getPro =() =>{
    return new Promise((resolve,reject) =>{
     console.log("I am Promise ")
   //  resolve("Success");
   reject("Error")
    });
   }
   let pro = getPro();
   pro.then(()=>{
    console.log("Promise fullfil..");
   });
   pro.catch(()=>{
    console.log("Rejected...")
   })
 

/*
Async / Await : async and await make Promises easier to write and read.

async → makes a function return a promise
await → waits for the promise to finish
*/

function data(id){
  return new Promise((resolve,reject) =>{
   setTimeout(() =>{
    console.log("Data : ",id);
    resolve("Success");
   },7000);
  });
}
 (async function f1(){
   await data(1);
   await data(2);
   await data(3);
  })();

    </script>
    
</body>
</html>
